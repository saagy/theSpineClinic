name: spine_clinic_app
description: "The Spine Clinic - Enterprise Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Modern State Management Architecture
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Backend & Declarative Shell
  supabase_flutter: ^2.8.0
  go_router: ^14.0.0

  # Serialization Contracts
  freezed_annotation: ^3.0.0-dev.1
  json_annotation: ^4.9.0

  # Form Processing & Utility Modules
  file_picker: ^9.0.0
  intl: ^0.20.0
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # The Local Project Compilation Machine
  build_runner: ^2.4.14
  freezed: ^3.0.0-dev.1
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.3

# This separate structural root configuration block maps out Flutter system assets
flutter:
  uses-material-design: true

  assets:
    - .env