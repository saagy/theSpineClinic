<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Spine Clinic">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Spine Clinic</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin:0; background:#F8FAFC; }
    #loading { display:flex; align-items:center; justify-content:center;
      height:100vh; font-family:sans-serif; color:#475569; font-size:14px; }
    #error { display:none; align-items:center; justify-content:center;
      height:100vh; font-family:monospace; color:#E11D48; font-size:13px;
      padding:20px; white-space:pre-wrap; word-break:break-all; }
  </style>
  <script>
    window.addEventListener('error', function(e) {
      var el = document.getElementById('error');
      if (el) {
        el.style.display = 'flex';
        el.textContent = 'JS Error: ' + (e.message || e.error || 'Unknown error');
      }
      var ld = document.getElementById('loading');
      if (ld) ld.style.display = 'none';
    });
  </script>
</head>
<body>
  <div id="loading">Loading Spine Clinic...</div>
  <div id="error"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
