<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Spine Clinic">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Spine Clinic</title>
  <link rel="manifest" href="manifest.json">
  <!-- BUILD_ID injected at deploy time so the page knows it changed -->
  <meta name="build-id" content="BUILD_PLACEHOLDER">
  <style>
    body { margin:0; background:#F8FAFC; }
    #loading { display:flex; align-items:center; justify-content:center;
      height:100vh; font-family:sans-serif; color:#475569; font-size:14px; }
    #error { display:none; align-items:center; justify-content:center;
      height:100vh; font-family:monospace; color:#E11D48; font-size:13px;
      padding:20px; white-space:pre-wrap; word-break:break-all; }
  </style>
  <script>
    window.addEventListener('error', function(e) {
      var el = document.getElementById('error');
      if (el) {
        el.style.display = 'flex';
        el.textContent = 'JS Error: ' + (e.message || e.error || 'Unknown error');
      }
      var ld = document.getElementById('loading');
      if (ld) ld.style.display = 'none';
    });
  </script>

  <!-- ── Service Worker: block Flutter's self-destructing SW, register ours ── -->
  <script>
    (function() {
      if (!('serviceWorker' in navigator)) return;

      // ── Block Flutter's deprecated SW registration ─────────────
      var _orig = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(url, opts) {
        if (typeof url === 'string' && url.indexOf('flutter_service_worker') !== -1) {
          console.debug('[SW] Blocked Flutter service worker — using custom sw.js instead.');
          return Promise.resolve({ installing: null, waiting: null, active: null, scope: '/' });
        }
        return _orig.call(this, url, opts);
      };

      // ── Register our proper caching SW ─────────────────────────
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
          console.debug('[SW] Registered sw.js, scope:', reg.scope);

          // Relay skipWaiting to new waiting workers
          reg.addEventListener('updatefound', function() {
            var w = reg.installing;
            if (!w) return;
            w.addEventListener('statechange', function() {
              if (w.state === 'installed' && navigator.serviceWorker.controller) {
                w.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });

          // If a waiting worker already exists, activate it
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        }).catch(function(e) {
          console.debug('[SW] Registration failed:', e);
        });

        // ── Reload when a genuinely new SW version activates ──────
        var hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (hadController) {
            console.debug('[SW] New version activated — reloading.');
            window.location.reload();
          }
        });
      });
    })();
  </script>
</head>
<body>
  <div id="loading">Loading Spine Clinic...</div>
  <div id="error"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
